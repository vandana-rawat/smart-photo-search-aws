version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting frontend deployment..."

  build:
    commands:
      - echo "No build needed for static frontend"

  post_build:
    commands:
      - echo "Deploying frontend files..."
      - aws s3 sync front-end/ s3://smart-photo-frontend-gurjeet --delete --exclude "README.md" --exclude "buildspec.yml"
      - echo "Frontend deployment complete"

artifacts:
  files:
    - front-end/index.html
    - front-end/app.js
    - front-end/style.css
    - front-end/sdk-search/**/*