version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12

  build:
    commands:
      - echo "Packaging index-photos Lambda"
      - cd lambda-functions/index-photos
      - rm -rf package index-photos.zip
      - mkdir -p package
      - pip install -r requirements.txt -t package || true
      - cp lambda_function.py package/
      - cd package
      - zip -r ../index-photos.zip .
      - cd ../../..

      - echo "Packaging search-photos Lambda"
      - cd lambda-functions/search-photos
      - rm -rf package search-photos.zip
      - mkdir -p package
      - pip install -r requirements.txt -t package || true
      - cp lambda_function.py package/
      - cd package
      - zip -r ../search-photos.zip .
      - cd ../../..

  post_build:
    commands:
      - echo "Updating index-photos Lambda in current account"
      - aws lambda update-function-code --function-name index-photos --zip-file fileb://lambda-functions/index-photos/index-photos.zip

      - echo "Assuming cross-account role for search-photos"
      - CREDS=$(aws sts assume-role --role-arn arn:aws:iam::550045800765:role/CrossAccountLambdaDeployRole --role-session-name deploy-search)

      - export AWS_ACCESS_KEY_ID=$(echo $CREDS | python -c "import sys,json; print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")
      - export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | python -c "import sys,json; print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")
      - export AWS_SESSION_TOKEN=$(echo $CREDS | python -c "import sys,json; print(json.load(sys.stdin)['Credentials']['SessionToken'])")

      - echo "Updating search-photos Lambda in teammate account"
      - aws lambda update-function-code --function-name search-photos --zip-file fileb://lambda-functions/search-photos/search-photos.zip

      - echo "P1 deployment complete"