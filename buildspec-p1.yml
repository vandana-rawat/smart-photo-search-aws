version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12

  pre_build:
    commands:
      - echo "Preparing index-photos Lambda deployment"
      - cd lambda-functions/index-photos
      - mkdir -p package
      - pip install -r requirements.txt -t package || true

  build:
    commands:
      - echo "Packaging Lambda function"
      - cp lambda_function.py package/
      - cd package
      - zip -r ../index-photos.zip .

  post_build:
    commands:
      - echo "Updating Lambda function code"
      - cd ..
      - aws lambda update-function-code --function-name index-photos --zip-file fileb://index-photos.zip
      - echo "Deployment complete"